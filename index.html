<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento | Quesos del Sol</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #0056b3; /* Azul corporativo */
        }
        h1 { color: #0056b3; }
        p { font-size: 1.2rem; line-height: 1.6; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        .highlight { color: #ff9900; font-weight: bold; } /* Naranja/Amarillo contraste */
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🧀</div>
        <h1>Estamos en Mantenimiento</h1>
        <p>Nuestro servidor <span class="highlight">gramiserver0</span> está temporalmente fuera de línea por labores de restauración energética.</p>
        <p>Estamos trabajando para volver con los mejores quesos muy pronto. ¡Gracias por tu paciencia!</p>
    </div>
</body>
</html>
